name: Release

# Triggered when release-please publishes a GitHub Release. Builds the
# distribution, attaches the artifacts to the release, and publishes to PyPI
# via Trusted Publishing (OIDC — no API token needed).

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Check artifacts
        run: |
          python -m pip install twine
          twine check dist/*
      - name: Attach artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi-publish:
    needs: build
    runs-on: ubuntu-latest
    # PyPI Trusted Publishing requires a one-time setup on PyPI. Until then,
    # this job will fail without affecting the GitHub Release above. See
    # RELEASING.md for the setup steps.
    environment:
      name: pypi
      url: https://pypi.org/p/gcp-finops-dashboard
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
