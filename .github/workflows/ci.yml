name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy src
      - name: Pytest
        run: pytest --cov=gcp_finops_dashboard --cov-report=term-missing --cov-fail-under=85

  # --- Deployment artifact validation (no push) -----------------------------
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write   # upload Trivy SARIF to code scanning
    steps:
      - uses: actions/checkout@v7
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: gcp-finops-dashboard:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke-test the image
        run: docker run --rm gcp-finops-dashboard:ci --version

      # Scan the built image and surface findings under Security > Code scanning.
      # Informational (does not fail the build); flip exit-code to 1 to gate.
      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: gcp-finops-dashboard:ci
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 0
      - name: Upload Trivy results to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image

  helm:
    name: Helm lint & template
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: azure/setup-helm@v4
      - name: Lint
        run: helm lint deploy/helm/gcp-finops-dashboard
      - name: Template renders
        run: |
          helm template ci deploy/helm/gcp-finops-dashboard \
            --set config.billing_account_id=01ABCD-23EFGH-456789 \
            --set config.bq_table=p.d.t \
            --set slack.webhook=https://hooks.slack.com/services/T/B/X \
            > /dev/null

  terraform:
    name: Terraform validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: hashicorp/setup-terraform@v3
      - name: Format check
        run: terraform -chdir=deploy/terraform fmt -check -recursive
      - name: Init & validate
        run: |
          terraform -chdir=deploy/terraform init -backend=false -input=false
          terraform -chdir=deploy/terraform validate
