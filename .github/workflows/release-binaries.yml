name: Release binaries

# Build standalone single-file executables (no Python/pip required) and attach
# them to the GitHub Release. Triggered when a release is published; also
# dispatchable manually against an existing tag.
#
# Note: a release created by release-please uses the default GITHUB_TOKEN, whose
# events do not trigger other workflows. Re-run this workflow (or re-publish the
# release) to build the assets in that case.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and attach binaries to (e.g. v0.2.1)"
        required: true

permissions:
  contents: write       # upload assets to the release

jobs:
  build:
    name: ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: gcp-finops-linux-x86_64
            bin: gcp-finops
          - os: macos-13
            asset: gcp-finops-macos-x86_64
            bin: gcp-finops
          - os: macos-latest
            asset: gcp-finops-macos-arm64
            bin: gcp-finops
          - os: windows-latest
            asset: gcp-finops-windows-x86_64.exe
            bin: gcp-finops.exe
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install . pyinstaller

      - name: Build single-file binary
        run: |
          pyinstaller --onefile --name gcp-finops \
            --collect-all google \
            --collect-all grpc \
            --collect-all proto \
            --collect-all google_crc32c \
            packaging/pyinstaller_entry.py
        shell: bash

      - name: Smoke-test the binary
        run: ./dist/${{ matrix.bin }} --version
        shell: bash

      - name: Rename and checksum
        run: |
          mv "dist/${{ matrix.bin }}" "${{ matrix.asset }}"
          shasum -a 256 "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
        shell: bash

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.tag }}
          files: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256
