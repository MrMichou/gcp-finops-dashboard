name: Publish Docker image

# Build and push a container image to the GitHub Container Registry (GHCR).
# Triggers:
#   - on a version tag (v1.2.3)            -> tagged + semver + latest images
#   - on a published GitHub release        -> same, from the release tag
#   - manually (workflow_dispatch)         -> a :main / sha image for testing
on:
  push:
    tags: ["v*.*.*"]
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# Avoid two publishes racing for the same ref.
concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write       # push to GHCR
      id-token: write       # for build provenance attestation
      attestations: write   # to persist the attestation
    steps:
      - uses: actions/checkout@v7

      # GHCR repository paths must be lowercase; github.repository may be mixed-case.
      - name: Lowercase image name
        id: img
        run: echo "name=${REGISTRY}/${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' || github.event_name == 'release' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      # Non-blocking: the image is already pushed by this point, so an
      # attestation hiccup must not fail the publish.
      - name: Generate build provenance attestation
        continue-on-error: true
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ steps.img.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
