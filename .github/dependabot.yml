version: 2
updates:
  # Python dependencies declared in pyproject.toml
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      python-minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used by the CI workflow
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
