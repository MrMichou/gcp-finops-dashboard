{{- if and .Values.slack.webhook (not .Values.slack.existingSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gcp-finops-dashboard.slackSecretName" . }}
  labels:
    {{- include "gcp-finops-dashboard.labels" . | nindent 4 }}
type: Opaque
stringData:
  webhook: {{ .Values.slack.webhook | quote }}
{{- end }}
