# Pre-commit hooks mirroring the checks enforced in CI (.github/workflows/ci.yml).
# Install once with:  pip install pre-commit && pre-commit install
# Run on everything:  pre-commit run --all-files
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  # Matches `ruff check .` in CI. (CI does not enforce a formatter, so
  # ruff-format is intentionally not run here.)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        files: ^src/
        additional_dependencies: []
